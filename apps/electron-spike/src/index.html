<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenSnapTracker Electron Spike</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="overlay" class="overlay">
      <header>
        <button data-mode="interactive" title="Interactive">I</button>
        <strong id="title">Deck</strong>
        <span id="debug-badge" class="debug-badge">debug</span>
        <button id="reset-button" title="Reset geometry">R</button>
        <button data-mode="edit" title="Edit">E</button>
      </header>
      <div id="debug-line" class="debug-line"></div>
      <main id="grid" class="grid"></main>
      <footer>
        <button><span>Deck</span><strong>8</strong></button>
        <button><span>Hand</span><strong>4</strong></button>
        <button id="zone-button">Destroyed <span>0</span></button>
        <button><span>Discard</span><strong>0</strong></button>
        <button><span>Removed</span><strong>0</strong></button>
      </footer>
      <div id="tooltip" class="tooltip" hidden></div>
    </div>
    <script>
      const { ipcRenderer } = require("electron");
      const params = new URLSearchParams(location.search);
      const id = params.get("id") || "player";
      const title = document.getElementById("title");
      const grid = document.getElementById("grid");
      const tooltip = document.getElementById("tooltip");
      const debugBadge = document.getElementById("debug-badge");
      const debugLine = document.getElementById("debug-line");
      let zone = false;

      title.textContent = id === "player" ? "Player Deck" : "Opponent";
      debugBadge.textContent = id.toUpperCase();
      document.body.dataset.overlayId = id;

      function render() {
        grid.innerHTML = "";
        for (let i = 0; i < 12; i += 1) {
          const card = document.createElement("button");
          card.className = "card";
          if (id === "opponent" && i > 4) card.classList.add("unknown");
          if (i === 1 || i === 6) card.classList.add("consumed");
          card.textContent = id === "opponent" && i > 4 ? "?" : String(i + 1);
          card.addEventListener("mouseenter", () => {
            window.tooltipTimer = setTimeout(() => {
              tooltip.textContent = `Placeholder ${i + 1} | Cost ${i % 6} | Power ${(i + 1) % 10} | Canonical ability text`;
              tooltip.hidden = false;
              tooltip.style.left = "8px";
              tooltip.style.top = "44px";
            }, 250);
          });
          card.addEventListener("mouseleave", () => {
            clearTimeout(window.tooltipTimer);
            tooltip.hidden = true;
          });
          grid.appendChild(card);
        }
      }

      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.addEventListener("click", () => ipcRenderer.send("set-mode", button.dataset.mode));
      });
      document.getElementById("reset-button").addEventListener("click", () => ipcRenderer.send("reset-geometry"));
      document.getElementById("zone-button").addEventListener("click", () => {
        zone = !zone;
        title.textContent = zone ? "Destroyed" : id === "player" ? "Player Deck" : "Opponent";
        render();
      });
      ipcRenderer.on("mode", (_event, mode) => {
        document.body.dataset.mode = mode;
        if (mode === "passthrough") tooltip.hidden = true;
      });
      ipcRenderer.on("debug-state", (_event, state) => {
        const bounds = state.bounds;
        debugLine.textContent = `${state.id} | ${state.mode} | ${bounds.x},${bounds.y} ${bounds.width}x${bounds.height}`;
      });
      render();
    </script>
  </body>
</html>
