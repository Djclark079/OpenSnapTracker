<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenSnapTracker Electron Spike</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="overlay" class="overlay">
      <header>
        <button data-mode="interactive" title="Interactive">I</button>
        <strong id="title">Deck</strong>
        <span id="debug-badge" class="debug-badge">debug</span>
        <button id="reset-button" title="Reset geometry">R</button>
        <button data-mode="edit" title="Edit">E</button>
      </header>
      <div id="debug-line" class="debug-line"></div>
      <main id="grid" class="grid"></main>
      <footer>
        <button data-view="deck"><span>Deck</span><strong id="counter-deck">8</strong></button>
        <button><span>Hand</span><strong id="counter-hand">4</strong></button>
        <button data-view="destroyed"><span>Destroyed</span><strong id="counter-destroyed">0</strong></button>
        <button data-view="discarded"><span>Discarded</span><strong id="counter-discarded">0</strong></button>
        <button data-view="removed"><span>Removed</span><strong id="counter-removed">0</strong></button>
      </footer>
      <div id="tooltip" class="tooltip" hidden></div>
      <div class="resize-handle resize-handle-west" data-resize-edge="west" title="Resize width"></div>
      <div class="resize-handle resize-handle-east" data-resize-edge="east" title="Resize width"></div>
      <div class="resize-handle resize-handle-south" data-resize-edge="south" title="Resize height"></div>
      <div class="resize-handle resize-handle-corner resize-handle-corner-left" data-resize-edge="south-west" title="Resize"></div>
      <div class="resize-handle resize-handle-corner" data-resize-edge="south-east" title="Resize"></div>
    </div>
    <section id="extra-panel" class="extra-panel" hidden>
      <button id="extra-toggle" class="extra-toggle" title="Supplemental cards">Extra Cards: 0</button>
      <div id="extra-drawer" class="extra-drawer" hidden></div>
    </section>
    <script>
      const { ipcRenderer } = require("electron");
      const params = new URLSearchParams(location.search);
      const id = params.get("id") || "player";
      const title = document.getElementById("title");
      const grid = document.getElementById("grid");
      const tooltip = document.getElementById("tooltip");
      const extraPanel = document.getElementById("extra-panel");
      const extraToggle = document.getElementById("extra-toggle");
      const extraDrawer = document.getElementById("extra-drawer");
      const debugBadge = document.getElementById("debug-badge");
      const debugLine = document.getElementById("debug-line");
      const counters = {
        deck: document.getElementById("counter-deck"),
        hand: document.getElementById("counter-hand"),
        destroyed: document.getElementById("counter-destroyed"),
        discarded: document.getElementById("counter-discarded"),
        removed: document.getElementById("counter-removed")
      };
      let currentView = "deck";
      let extraOpen = false;
      let panel = null;
      let tooltipTimer = 0;
      let latestBounds = null;
      let activeResize = null;
      let mode = "interactive";
      let latestPayloadSequence = 0;
      let lastExpansionHeight = 0;
      let pendingExpansionRefresh = false;
      let lastActionableSupplementalSignature = "";

      title.textContent = id === "player" ? "Player Deck" : "Opponent";
      debugBadge.textContent = id.toUpperCase();
      document.body.dataset.overlayId = id;
      globalThis.__ostForcePaint = () => {
        document.body.dataset.paintTick = String(Date.now());
        void document.body.offsetHeight;
      };

      function viewTitle() {
        if (currentView === "deck") return panel?.title || (id === "player" ? "Player Deck" : "Opponent");
        return currentView.charAt(0).toUpperCase() + currentView.slice(1);
      }

      function cardLabel(card, fallback) {
        return card?.label || fallback;
      }

      function tooltipText(card, fallback) {
        const label = cardLabel(card, fallback);
        if (label === "?") return "Unknown card";
        return `${label}\nRules text unavailable in this replay payload.`;
      }

      function showTooltip(event, card, fallback) {
        if (mode === "passthrough") return;
        clearTimeout(tooltipTimer);
        tooltipTimer = setTimeout(() => {
          tooltip.textContent = tooltipText(card, fallback);
          tooltip.hidden = false;
          const offset = 12;
          tooltip.style.left = `${event.clientX + offset}px`;
          tooltip.style.top = `${event.clientY + offset}px`;
          requestAnimationFrame(() => {
            const rect = tooltip.getBoundingClientRect();
            const left = Math.max(6, Math.min(event.clientX + offset, window.innerWidth - rect.width - 6));
            const top = Math.max(6, Math.min(event.clientY + offset, window.innerHeight - rect.height - 6));
            tooltip.style.left = `${left}px`;
            tooltip.style.top = `${top}px`;
          });
        }, 250);
      }

      function hideTooltip() {
        clearTimeout(tooltipTimer);
        tooltip.hidden = true;
      }

      function makeCard(card, fallback, unknown = false) {
        const button = document.createElement("button");
        button.className = "card";
        if (unknown || card?.knowledge === "unknown_card") button.classList.add("unknown");
        if (card?.consumed_from_deck) button.classList.add("consumed");
        if (card?.raw_zone === "Player.log:away") button.classList.add("away");
        const label = document.createElement("span");
        label.className = "card-label";
        label.textContent = cardLabel(card, fallback);
        button.appendChild(label);
        button.addEventListener("mouseenter", (event) => showTooltip(event, card, fallback));
        button.addEventListener("mousemove", (event) => {
          if (!tooltip.hidden) {
            const offset = 12;
            tooltip.style.left = `${Math.min(event.clientX + offset, window.innerWidth - tooltip.offsetWidth - 6)}px`;
            tooltip.style.top = `${Math.min(event.clientY + offset, window.innerHeight - tooltip.offsetHeight - 6)}px`;
          }
        });
        button.addEventListener("mouseleave", hideTooltip);
        return button;
      }

      function renderCounters() {
        counters.deck.textContent = String(panel?.counters?.deck ?? 8);
        counters.hand.textContent = String(panel?.counters?.hand ?? 4);
        counters.destroyed.textContent = String(panel?.counters?.destroyed ?? 0);
        counters.discarded.textContent = String(panel?.counters?.discarded ?? 0);
        counters.removed.textContent = String(panel?.counters?.removed ?? 0);
      }

      function renderExtraDrawer() {
        const cards = panel?.supplemental || [];
        extraPanel.hidden = cards.length === 0;
        extraToggle.textContent = `Extra Cards: ${cards.length}`;
        extraToggle.toggleAttribute("data-active", extraOpen && cards.length > 0);
        extraDrawer.hidden = !extraOpen || cards.length === 0;
        extraDrawer.innerHTML = "";
        if (!extraDrawer.hidden) {
          for (const card of cards) {
            extraDrawer.appendChild(makeCard(card, "?"));
          }
        }
        requestSupplementalExpansion();
      }

      function actionableSupplementalSignature() {
        const cards = panel?.supplemental || [];
        return cards
          .filter((card) => card?.knowledge !== "unknown_card" && !card?.consumed_from_deck)
          .map((card) => `${card.card_definition_key || card.label || "?"}:${card.zone || ""}`)
          .sort()
          .join("|");
      }

      function requestSupplementalExpansion() {
        if (activeResize) {
          pendingExpansionRefresh = true;
          return;
        }
        requestAnimationFrame(() => {
          if (activeResize) {
            pendingExpansionRefresh = true;
            return;
          }
          const height = extraPanel.hidden ? 0 : Math.ceil(extraPanel.getBoundingClientRect().height);
          document.documentElement.style.setProperty("--extra-height", `${height}px`);
          if (height === lastExpansionHeight) return;
          lastExpansionHeight = height;
          ipcRenderer.send("set-supplemental-expansion", { id, height });
          requestAnimationFrame(() => globalThis.__ostForcePaint());
        });
      }

      function renderActiveFooterButton() {
        document.querySelectorAll("[data-view]").forEach((button) => {
          button.toggleAttribute("data-active", button.dataset.view === currentView);
        });
      }

      function finishResize() {
        if (!activeResize) return;
        activeResize = null;
        ipcRenderer.send("resize-overlay-finished");
        if (pendingExpansionRefresh) {
          pendingExpansionRefresh = false;
          requestSupplementalExpansion();
        }
      }

      function render() {
        grid.innerHTML = "";
        title.textContent = viewTitle();
        renderCounters();
        renderExtraDrawer();
        renderActiveFooterButton();
        grid.classList.toggle("zone-view", currentView !== "deck");
        globalThis.__ostForcePaint();

        if (panel && currentView === "deck") {
          for (const slot of panel.deck_slots || []) {
            grid.appendChild(makeCard(slot.card, slot.state === "unknown" ? "?" : String(slot.slot_index + 1), slot.state === "unknown"));
          }
          return;
        }

        if (panel && currentView !== "deck") {
          const cards = panel[currentView] || [];
          if (cards.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty-zone";
            empty.textContent = "No cards";
            grid.appendChild(empty);
            return;
          }
          for (const card of cards) grid.appendChild(makeCard(card, "?"));
          return;
        }

        for (let i = 0; i < 12; i += 1) {
          const unknown = id === "opponent" && i > 4;
          const card = {
            label: unknown ? "?" : String(i + 1),
            knowledge: unknown ? "unknown_card" : "known_card",
            consumed_from_deck: i === 1 || i === 6
          };
          grid.appendChild(makeCard(card, card.label, unknown));
        }
      }

      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.addEventListener("click", () => ipcRenderer.send("set-mode", button.dataset.mode));
      });
      document.getElementById("reset-button").addEventListener("click", () => ipcRenderer.send("reset-geometry"));
      document.querySelectorAll("[data-view]").forEach((button) => {
        button.addEventListener("click", () => {
          const next = button.dataset.view;
          currentView = currentView === next ? "deck" : next;
          hideTooltip();
          render();
        });
      });
      extraToggle.addEventListener("click", () => {
        extraOpen = !extraOpen;
        hideTooltip();
        renderExtraDrawer();
      });
      ipcRenderer.on("overlay-payload", (_event, payload) => {
        const nextPanel = payload.panel;
        if (!nextPanel) {
          currentView = "deck";
          extraOpen = false;
        }
        panel = nextPanel;
        latestPayloadSequence = payload.sequence || latestPayloadSequence;
        debugBadge.textContent = panel ? `${id.toUpperCase()} DATA` : id.toUpperCase();
        if ((panel?.supplemental || []).length === 0) extraOpen = false;
        const actionableSignature = actionableSupplementalSignature();
        if (id === "opponent" && actionableSignature && actionableSignature !== lastActionableSupplementalSignature) {
          extraOpen = true;
        }
        lastActionableSupplementalSignature = actionableSignature;
        render();
        if (latestBounds) {
          debugLine.textContent = `${id} | ${mode} | ${latestBounds.x},${latestBounds.y} ${latestBounds.width}x${latestBounds.height} | update ${latestPayloadSequence}`;
        }
      });
      ipcRenderer.on("mode", (_event, nextMode) => {
        mode = nextMode;
        document.body.dataset.mode = mode;
        if (mode === "passthrough") hideTooltip();
      });
      ipcRenderer.on("supplemental-expansion-reset", () => {
        extraOpen = false;
        lastExpansionHeight = 0;
        document.documentElement.style.setProperty("--extra-height", "0px");
        renderExtraDrawer();
      });
      ipcRenderer.on("debug-state", (_event, state) => {
        const bounds = state.bounds;
        latestBounds = bounds;
        debugLine.textContent = `${state.id} | ${state.mode} | ${bounds.x},${bounds.y} ${bounds.width}x${bounds.height} | update ${latestPayloadSequence}`;
      });

      document.querySelectorAll("[data-resize-edge]").forEach((handle) => {
        handle.addEventListener("pointerdown", (event) => {
          if (mode !== "edit" || !latestBounds) return;
          event.preventDefault();
          handle.setPointerCapture(event.pointerId);
          activeResize = {
            edge: handle.dataset.resizeEdge,
            pointerId: event.pointerId,
            startScreenX: event.screenX,
            startScreenY: event.screenY
          };
          ipcRenderer.send("resize-overlay-start", {
            id,
            edge: activeResize.edge,
            startScreenX: activeResize.startScreenX,
            startScreenY: activeResize.startScreenY
          });
        });
        handle.addEventListener("pointermove", (event) => {
          if (!activeResize || activeResize.pointerId !== event.pointerId) return;
          if ((event.buttons & 1) === 0) {
            finishResize();
            return;
          }
          ipcRenderer.send("resize-overlay", {
            id,
            screenX: event.screenX,
            screenY: event.screenY
          });
        });
        handle.addEventListener("pointerup", (event) => {
          if (!activeResize || activeResize.pointerId !== event.pointerId) return;
          finishResize();
        });
        handle.addEventListener("pointercancel", () => {
          finishResize();
        });
        handle.addEventListener("lostpointercapture", () => {
          finishResize();
        });
      });
      window.addEventListener("pointerup", finishResize);
      window.addEventListener("pointercancel", finishResize);
      window.addEventListener("blur", finishResize);
      window.addEventListener("resize", requestSupplementalExpansion);
      render();
    </script>
  </body>
</html>
